version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smart-pfe-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_pfe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smart-pfe-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: smart-pfe-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DATABASE_URL=postgres://postgres:password@db:5432/smart_pfe
      - AI_SERVICE_URL=http://ai-service:8001
    depends_on:
      - db
      - redis
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    container_name: smart-pfe-ai
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./ai-service:/app
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      # During development, we can mount volume to use create-react-app dev server instead of nginx
    container_name: smart-pfe-frontend
    # Uncomment next lines for Dev Mode instead of Nginx Prod Build
    # command: npm start
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    ports:
      - "3000:80"
    # environment:
    #   - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
